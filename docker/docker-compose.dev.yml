services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: bale_bot
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: bale_bot
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bale_bot"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ../backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql://bale_bot:dev_password@db:5432/bale_bot
      - DEBUG=true
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG
      - LOG_FORMAT=text
      - PYTHONPATH=/app/src
      - BALE_BOT_TOKEN=${BALE_BOT_TOKEN:-}
      - BALE_API_URL=${BALE_API_URL:-https://tapi.bale.ai/bot{0}/{1}}
      - BALE_BOT_PHONE=${BALE_BOT_PHONE:-}
    depends_on:
      db:
        condition: service_healthy
    working_dir: /app/src
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
